name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  signaling:
    name: Signaling (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: signaling
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: signaling/go.sum
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...

  client-rust:
    name: Client (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "client/src-tauri -> target"
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: cargo fmt --manifest-path client/src-tauri/Cargo.toml -- --check
      - run: cargo clippy --manifest-path client/src-tauri/Cargo.toml -- -D warnings
      - run: cargo test --manifest-path client/src-tauri/Cargo.toml

  client-frontend:
    name: Client (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # No cache until pnpm-lock.yaml is committed
      - run: pnpm install
      - run: pnpm build
